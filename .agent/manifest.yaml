project:
  name: stellartail.cn
  repository: https://github.com/rustella/stellartail.cn
  visibility: public
  type: static-official-website
  deploy_targets:
    - name: github-pages-default
      url: https://rustella.github.io/stellartail.cn/
      base_path_env: SITE_BASE_PATH
    - name: configurable-static-host
      url: external deployment-specific URL
      base_path_env: SITE_BASE_PATH
stack:
  runtime: node22
  framework: vite
  language: typescript
  styles: css
  testing: playwright
source_roots:
  - src
  - docs
  - downloads
  - public
  - scripts
  - tests
config_paths:
  - package.json
  - tsconfig.json
  - vite.config.ts
  - playwright.config.ts
  - .github/workflows/ci.yml
  - .github/workflows/deploy-pages.yml
  - config/docs.example.json
generated_paths:
  - node_modules
  - dist
  - coverage
  - test-results
  - playwright-report
entrypoints:
  app: src/main.ts
  html: index.html
  docs_html: docs/index.html
  docs_app: src/docs.ts
  downloads_html: downloads/index.html
  downloads_app: src/downloads.ts
policies:
  comments_language: english
  i18n_required: true
  static_only: true
  backend_dependency_allowed: false
  unavailable_feature_marketing_allowed: false
  reduced_motion_required: true
  custom_domain_configured: false
  deployment_base_must_be_configurable: true
  docs_origin_committed: false
  docs_runtime_backend_requests_allowed: user_initiated_only
validation:
  canonical: npm run check
  deploy_base: npm run validate:deploy-base
  docs_config: npm run validate:docs-config
freshness:
  last_updated: 2026-05-17
  source: implementation from Hermes plan 2026-05-17_162238-docs-api-reference-page.md plus current code inspection
