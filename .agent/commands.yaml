commands:
  - name: install
    cwd: .
    command: npm install
    when_to_run: after package.json or package-lock.json changes
    side_effects: writes node_modules and package-lock.json
  - name: dev
    cwd: .
    command: npm run dev
    when_to_run: local browser development
    side_effects: starts a local Vite server
  - name: validate-i18n
    cwd: .
    command: npm run validate:i18n
    when_to_run: after copy or locale changes
    side_effects: none
  - name: validate-no-backend
    cwd: .
    command: npm run validate:no-backend
    when_to_run: before commit
    side_effects: none
  - name: validate-no-unavailable-feature-copy
    cwd: .
    command: npm run validate:no-routes-copy
    when_to_run: before commit
    side_effects: none
  - name: validate-docs-config
    cwd: .
    command: npm run validate:docs-config
    when_to_run: after docs page or docs deployment config changes
    side_effects: none
  - name: typecheck
    cwd: .
    command: npm run typecheck
    when_to_run: before commit
    side_effects: none
  - name: build-root
    cwd: .
    command: SITE_BASE_PATH=/ npm run build
    when_to_run: before generic static-host deployment
    side_effects: writes dist
  - name: validate-root-base
    cwd: .
    command: EXPECTED_BASE_PATH=/ npm run validate:deploy-base
    when_to_run: after root build
    side_effects: none
  - name: build-github-pages
    cwd: .
    command: SITE_BASE_PATH=/stellartail.cn/ VITE_PUBLIC_SITE_URL=https://rustella.github.io/stellartail.cn/ npm run build
    when_to_run: before GitHub Pages default-domain deployment
    side_effects: writes dist
  - name: validate-github-pages-base
    cwd: .
    command: EXPECTED_BASE_PATH=/stellartail.cn/ npm run validate:deploy-base
    when_to_run: after GitHub Pages build
    side_effects: none
  - name: e2e
    cwd: .
    command: npm run test:e2e
    when_to_run: before commit or after visual/i18n changes
    side_effects: writes test-results on failure
  - name: check
    cwd: .
    command: npm run check
    when_to_run: final verification
    side_effects: writes dist and may write test-results on failure
